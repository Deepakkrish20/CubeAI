<svg viewBox="0 0 600 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09070F"/>
      <stop offset="100%" style="stop-color:#1E0B40"/>
    </linearGradient>
    <linearGradient id="carGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00B386"/>
      <stop offset="100%" style="stop-color:#006B50"/>
    </linearGradient>
    <linearGradient id="scooterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B21B6"/>
      <stop offset="100%" style="stop-color:#004D3A"/>
    </linearGradient>
    <linearGradient id="rickshawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D09C"/>
      <stop offset="100%" style="stop-color:#00D09C"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FDE68A"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00D09C;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#006B50;stop-opacity:0"/>
    </radialGradient>
    <filter id="gBlur"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="sBlur"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="xsBlur"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="480" fill="url(#bg)"/>
  <!-- Central glow -->
  <ellipse cx="300" cy="260" rx="230" ry="160" fill="url(#glowCenter)" filter="url(#gBlur)" opacity="0.8"/>

  <!-- Grid lines -->
  <g stroke="#00D09C" stroke-width="0.4" opacity="0.14">
    <line x1="0" y1="80" x2="600" y2="80"/>
    <line x1="0" y1="160" x2="600" y2="160"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="320" x2="600" y2="320"/>
    <line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="120" y1="0" x2="120" y2="480"/>
    <line x1="240" y1="0" x2="240" y2="480"/>
    <line x1="360" y1="0" x2="360" y2="480"/>
    <line x1="480" y1="0" x2="480" y2="480"/>
  </g>

  <!-- Ground strip -->
  <rect x="0" y="385" width="600" height="3" fill="#00D09C" opacity="0.2"/>
  <!-- Ground reflection gradient -->
  <rect x="0" y="388" width="600" height="60" fill="#09070F" opacity="0.6"/>

  <!-- ==========================================
       LEFT: E-RICKSHAW (small, background-left)
  =========================================== -->
  <g transform="translate(22, 230)" opacity="0.85">
    <!-- Body -->
    <rect x="10" y="30" width="100" height="60" rx="8" fill="url(#rickshawGrad)"/>
    <!-- Hood -->
    <path d="M 10 30 Q 20 8 50 5 L 90 5 Q 108 8 110 30 Z" fill="#5B21B6"/>
    <!-- Windshield -->
    <path d="M 18 30 Q 25 12 50 10 L 80 10 Q 98 12 102 30 Z" fill="#33DCB0" opacity="0.2"/>
    <!-- Wheels -->
    <circle cx="30" cy="90" r="20" fill="#0F172A"/>
    <circle cx="30" cy="90" r="13" fill="#1E293B"/>
    <circle cx="30" cy="90" r="5" fill="#00D09C"/>
    <circle cx="95" cy="90" r="20" fill="#0F172A"/>
    <circle cx="95" cy="90" r="13" fill="#1E293B"/>
    <circle cx="95" cy="90" r="5" fill="#00D09C"/>
    <!-- Headlights -->
    <rect x="105" y="42" width="10" height="7" rx="2" fill="#F59E0B" opacity="0.9"/>
    <!-- Lightning symbol -->
    <path d="M 52 18 L 58 30 L 52 30 L 60 44 L 44 34 L 50 34 Z" fill="#F59E0B" opacity="0.9"/>
    <!-- Label -->
    <text x="60" y="68" text-anchor="middle" font-family="Inter,system-ui" font-size="7" fill="white" font-weight="700" opacity="0.7">E-Rickshaw</text>
  </g>

  <!-- ==========================================
       RIGHT: E-SCOOTER (small, background-right)
  =========================================== -->
  <g transform="translate(440, 245)" opacity="0.85">
    <!-- Scooter body simplified -->
    <ellipse cx="70" cy="95" rx="42" ry="10" fill="#000" opacity="0.4"/>
    <!-- Rear wheel -->
    <circle cx="30" cy="95" r="28" fill="#0F172A"/>
    <circle cx="30" cy="95" r="19" fill="#1E293B"/>
    <g stroke="#334155" stroke-width="1.5">
      <line x1="30" y1="76" x2="30" y2="114"/>
      <line x1="11" y1="95" x2="49" y2="95"/>
      <line x1="16" y1="82" x2="44" y2="108"/>
      <line x1="16" y1="108" x2="44" y2="82"/>
    </g>
    <circle cx="30" cy="95" r="7" fill="#00D09C"/>
    <!-- Front wheel -->
    <circle cx="110" cy="95" r="24" fill="#0F172A"/>
    <circle cx="110" cy="95" r="16" fill="#1E293B"/>
    <g stroke="#334155" stroke-width="1.5">
      <line x1="110" y1="79" x2="110" y2="111"/>
      <line x1="94" y1="95" x2="126" y2="95"/>
    </g>
    <circle cx="110" cy="95" r="6" fill="#00D09C"/>
    <!-- Body -->
    <path d="M 42 95 Q 46 62 58 52 Q 70 42 88 40 L 105 42 Q 116 46 118 60 L 118 95 Z" fill="url(#scooterGrad)"/>
    <!-- Seat -->
    <path d="M 52 52 Q 70 43 95 44 Q 96 50 52 58 Z" fill="#00D09C"/>
    <!-- Handlebar -->
    <rect x="108" y="46" width="4" height="24" rx="2" fill="#1E293B"/>
    <rect x="100" y="46" width="18" height="6" rx="3" fill="#334155"/>
    <!-- Headlight -->
    <ellipse cx="120" cy="68" rx="7" ry="5" fill="#F59E0B" opacity="0.9"/>
    <!-- Label -->
    <text x="70" y="76" text-anchor="middle" font-family="Inter,system-ui" font-size="7" fill="white" font-weight="700" opacity="0.7">E-Scooter</text>
  </g>

  <!-- ==========================================
       CENTRE-FRONT: ELECTRIC AUTO / CAR (hero)
  =========================================== -->
  <g transform="translate(100, 245)">
    <!-- Shadow -->
    <ellipse cx="200" cy="138" rx="180" ry="10" fill="#000" opacity="0.5"/>
    <!-- Lower body -->
    <rect x="30" y="80" width="360" height="55" rx="10" fill="url(#carGrad)"/>
    <!-- Upper body / cabin -->
    <path d="M 80 80 Q 120 30 180 22 L 300 22 Q 360 30 390 80 Z" fill="#5B21B6"/>
    <!-- Windshield -->
    <path d="M 105 80 Q 138 38 178 30 L 295 30 Q 340 38 365 80 Z" fill="#8B5CF6" opacity="0.2"/>
    <!-- Windows -->
    <rect x="145" y="38" width="80" height="38" rx="5" fill="#33DCB0" opacity="0.18"/>
    <rect x="245" y="38" width="80" height="38" rx="5" fill="#33DCB0" opacity="0.18"/>
    <line x1="243" y1="32" x2="243" y2="134" stroke="#00B386" stroke-width="2" opacity="0.4"/>
    <!-- Front headlights (LED strip) -->
    <rect x="30" y="92" width="32" height="10" rx="3" fill="#F59E0B" opacity="0.9"/>
    <rect x="33" y="94" width="26" height="6" rx="2" fill="#FDE68A" opacity="0.8"/>
    <!-- Tail lights -->
    <rect x="360" y="92" width="30" height="10" rx="3" fill="#EF4444" opacity="0.9"/>
    <!-- Rear wheels -->
    <circle cx="120" cy="135" r="36" fill="#0F172A"/>
    <circle cx="120" cy="135" r="25" fill="#1E293B"/>
    <g stroke="#334155" stroke-width="2.5">
      <line x1="120" y1="110" x2="120" y2="160"/>
      <line x1="95" y1="135" x2="145" y2="135"/>
      <line x1="102" y1="117" x2="138" y2="153"/>
      <line x1="102" y1="153" x2="138" y2="117"/>
    </g>
    <circle cx="120" cy="135" r="11" fill="#334155"/>
    <circle cx="120" cy="135" r="5" fill="#00D09C"/>
    <!-- Front wheels -->
    <circle cx="305" cy="135" r="36" fill="#0F172A"/>
    <circle cx="305" cy="135" r="25" fill="#1E293B"/>
    <g stroke="#334155" stroke-width="2.5">
      <line x1="305" y1="110" x2="305" y2="160"/>
      <line x1="280" y1="135" x2="330" y2="135"/>
      <line x1="287" y1="117" x2="323" y2="153"/>
      <line x1="287" y1="153" x2="323" y2="117"/>
    </g>
    <circle cx="305" cy="135" r="11" fill="#334155"/>
    <circle cx="305" cy="135" r="5" fill="#00D09C"/>
    <!-- Charging port with glow -->
    <rect x="374" y="100" width="10" height="16" rx="3" fill="#00D09C" opacity="0.95"/>
    <rect x="374" y="100" width="10" height="16" rx="3" fill="#33DCB0" opacity="0.5" filter="url(#xsBlur)"/>
    <!-- Brand badge -->
    <circle cx="200" cy="80" r="10" fill="#00D09C" opacity="0.5"/>
    <text x="200" y="84" text-anchor="middle" font-family="Inter,system-ui" font-size="9" fill="white" font-weight="900">B</text>
    <!-- Lightning bolt -->
    <path d="M 192 2 L 208 22 L 195 22 L 213 46 L 178 30 L 193 30 Z" fill="#F59E0B" opacity="0.95"/>
  </g>

  <!-- ==========================================
       FLOATING STAT CARDS
  =========================================== -->
  <!-- Top centre banner -->
  <g transform="translate(170, 28)">
    <rect width="260" height="42" rx="21" fill="#fff" opacity="0.04" stroke="#00D09C" stroke-width="0.8"/>
    <text x="130" y="18" text-anchor="middle" font-family="Inter,system-ui" font-size="9" fill="#33DCB0" font-weight="700" letter-spacing="2">⚡ MOST AFFORDABLE EV LOANS</text>
    <text x="130" y="33" text-anchor="middle" font-family="Inter,system-ui" font-size="11" fill="white" font-weight="900">₹999/mo · Zero Hidden Charges</text>
  </g>

  <!-- Left stat card -->
  <g transform="translate(18, 145)">
    <rect width="130" height="72" rx="14" fill="#fff" opacity="0.04" stroke="#00D09C" stroke-width="0.8"/>
    <text x="14" y="24" font-family="Inter,system-ui" font-size="9" fill="#33DCB0" font-weight="800" letter-spacing="1">INTEREST RATE</text>
    <text x="14" y="46" font-family="Inter,system-ui" font-size="20" fill="white" font-weight="900">0.9%</text>
    <text x="14" y="62" font-family="Inter,system-ui" font-size="9" fill="#8B5CF6" font-weight="600">Per month flat</text>
  </g>

  <!-- Right stat card -->
  <g transform="translate(452, 145)">
    <rect width="130" height="72" rx="14" fill="#fff" opacity="0.04" stroke="#00D09C" stroke-width="0.8"/>
    <text x="14" y="24" font-family="Inter,system-ui" font-size="9" fill="#33DCB0" font-weight="800" letter-spacing="1">LOAN AMOUNT</text>
    <text x="14" y="46" font-family="Inter,system-ui" font-size="20" fill="white" font-weight="900">₹10L+</text>
    <text x="14" y="62" font-family="Inter,system-ui" font-size="9" fill="#8B5CF6" font-weight="600">Upto ₹10 Lakh</text>
  </g>

  <!-- Bottom stat strip -->
  <g transform="translate(60, 408)">
    <!-- Card 1 -->
    <g>
      <rect width="140" height="58" rx="12" fill="#fff" opacity="0.04" stroke="#00D09C" stroke-width="0.7"/>
      <text x="70" y="22" text-anchor="middle" font-family="Inter,system-ui" font-size="9" fill="#33DCB0" font-weight="700" letter-spacing="1">TENURE</text>
      <text x="70" y="42" text-anchor="middle" font-family="Inter,system-ui" font-size="16" fill="white" font-weight="900">Up to 48mo</text>
    </g>
    <!-- Card 2 -->
    <g transform="translate(165, 0)">
      <rect width="140" height="58" rx="12" fill="#fff" opacity="0.04" stroke="#00D09C" stroke-width="0.7"/>
      <text x="70" y="22" text-anchor="middle" font-family="Inter,system-ui" font-size="9" fill="#33DCB0" font-weight="700" letter-spacing="1">DISBURSAL</text>
      <text x="70" y="42" text-anchor="middle" font-family="Inter,system-ui" font-size="16" fill="white" font-weight="900">24 Hours</text>
    </g>
    <!-- Card 3 -->
    <g transform="translate(330, 0)">
      <rect width="140" height="58" rx="12" fill="#fff" opacity="0.04" stroke="#00D09C" stroke-width="0.7"/>
      <text x="70" y="22" text-anchor="middle" font-family="Inter,system-ui" font-size="9" fill="#33DCB0" font-weight="700" letter-spacing="1">CUSTOMERS</text>
      <text x="70" y="42" text-anchor="middle" font-family="Inter,system-ui" font-size="16" fill="white" font-weight="900">50,000+</text>
    </g>
  </g>

  <!-- Stars decoration -->
  <circle cx="35" cy="50" r="1.5" fill="white" opacity="0.35"/>
  <circle cx="560" cy="60" r="2" fill="white" opacity="0.3"/>
  <circle cx="575" cy="420" r="1.5" fill="#33DCB0" opacity="0.4"/>
  <circle cx="22" cy="395" r="1.5" fill="#33DCB0" opacity="0.4"/>
</svg>
