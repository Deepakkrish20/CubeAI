<svg viewBox="0 0 600 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09070F"/>
      <stop offset="100%" style="stop-color:#1E0B40"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#3B0764"/>
    </linearGradient>
    <linearGradient id="bodyGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#4C1D95"/>
    </linearGradient>
    <radialGradient id="glowBike" cx="50%" cy="60%" r="55%">
      <stop offset="0%" style="stop-color:#6D28D9;stop-opacity:0.55"/>
      <stop offset="100%" style="stop-color:#3B0764;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="wheelGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="18" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softBlur"><feGaussianBlur stdDeviation="14"/></filter>
    <filter id="softBlur2"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="480" fill="url(#bg)"/>

  <!-- Ambient glow behind scooter -->
  <ellipse cx="300" cy="290" rx="220" ry="140" fill="url(#glowBike)" filter="url(#softBlur)"/>

  <!-- Grid lines (editorial) -->
  <g stroke="#4C1D95" stroke-width="0.4" opacity="0.15">
    <line x1="0" y1="80" x2="600" y2="80"/>
    <line x1="0" y1="160" x2="600" y2="160"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="320" x2="600" y2="320"/>
    <line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="480"/>
    <line x1="200" y1="0" x2="200" y2="480"/>
    <line x1="300" y1="0" x2="300" y2="480"/>
    <line x1="400" y1="0" x2="400" y2="480"/>
    <line x1="500" y1="0" x2="500" y2="480"/>
  </g>

  <!-- Ground shadow -->
  <ellipse cx="300" cy="390" rx="190" ry="14" fill="#000" opacity="0.55"/>
  <!-- Ground line -->
  <rect x="0" y="388" width="600" height="2" fill="#4C1D95" opacity="0.25"/>

  <!-- ===== ELECTRIC SCOOTER ILLUSTRATION ===== -->
  <!-- Scooter positioned centre, side view facing right -->

  <!-- REAR WHEEL -->
  <circle cx="160" cy="350" r="58" fill="none" stroke="#0F172A" stroke-width="16"/>
  <circle cx="160" cy="350" r="50" fill="#0F172A"/>
  <circle cx="160" cy="350" r="42" fill="#1E293B"/>
  <!-- Spokes -->
  <g stroke="#334155" stroke-width="2.5">
    <line x1="160" y1="308" x2="160" y2="392"/>
    <line x1="118" y1="350" x2="202" y2="350"/>
    <line x1="130" y1="320" x2="190" y2="380"/>
    <line x1="130" y1="380" x2="190" y2="320"/>
    <line x1="122" y1="335" x2="198" y2="365"/>
    <line x1="122" y1="365" x2="198" y2="335"/>
  </g>
  <circle cx="160" cy="350" r="16" fill="#334155"/>
  <circle cx="160" cy="350" r="8" fill="#7C3AED"/>
  <!-- Tyre rim glow -->
  <circle cx="160" cy="350" r="50" fill="none" stroke="#7C3AED" stroke-width="2" opacity="0.4" filter="url(#softBlur2)"/>

  <!-- FRONT WHEEL -->
  <circle cx="440" cy="350" r="55" fill="none" stroke="#0F172A" stroke-width="14"/>
  <circle cx="440" cy="350" r="47" fill="#0F172A"/>
  <circle cx="440" cy="350" r="39" fill="#1E293B"/>
  <g stroke="#334155" stroke-width="2">
    <line x1="440" y1="311" x2="440" y2="389"/>
    <line x1="401" y1="350" x2="479" y2="350"/>
    <line x1="412" y1="322" x2="468" y2="378"/>
    <line x1="412" y1="378" x2="468" y2="322"/>
    <line x1="404" y1="337" x2="476" y2="363"/>
    <line x1="404" y1="363" x2="476" y2="337"/>
  </g>
  <circle cx="440" cy="350" r="14" fill="#334155"/>
  <circle cx="440" cy="350" r="7" fill="#7C3AED"/>
  <circle cx="440" cy="350" r="47" fill="none" stroke="#7C3AED" stroke-width="2" opacity="0.4" filter="url(#softBlur2)"/>

  <!-- SCOOTER BODY (main frame) -->
  <!-- Step-through platform / footboard -->
  <path d="M 190 330 L 415 330 L 425 345 L 180 345 Z" fill="#2E1065"/>
  <!-- Underbody cover -->
  <path d="M 175 335 Q 190 330 410 330 L 420 345 Q 180 345 165 340 Z" fill="#3B0764"/>

  <!-- Main body shell -->
  <path d="M 200 330 Q 210 270 240 240 Q 260 220 300 215 L 390 218 Q 420 222 435 240 Q 448 258 448 295 L 448 330 Z" fill="url(#bodyGrad)"/>

  <!-- Body highlight (top shine) -->
  <path d="M 210 295 Q 220 268 248 248 Q 266 234 298 230 L 375 232 Q 402 237 415 255" fill="none" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>

  <!-- Seat / saddle -->
  <path d="M 230 218 Q 260 205 330 205 L 380 208 Q 400 212 405 220 L 235 225 Z" fill="#5B21B6" rx="4"/>
  <path d="M 233 218 Q 260 208 330 207 L 378 210 Q 397 214 402 220" fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.5"/>

  <!-- REAR SECTION -->
  <!-- Rear mudguard -->
  <path d="M 175 310 Q 175 270 200 248 L 215 290 Q 200 305 195 330 Z" fill="#3B0764"/>
  <path d="M 178 305 Q 178 272 202 252 L 214 287 Q 200 300 198 326" fill="none" stroke="#7C3AED" stroke-width="1" opacity="0.4"/>
  <!-- Tail light -->
  <rect x="172" y="295" width="18" height="8" rx="3" fill="#EF4444" opacity="0.95"/>
  <rect x="172" y="295" width="18" height="8" rx="3" fill="#FCA5A5" opacity="0.4" filter="url(#softBlur2)"/>

  <!-- FRONT SECTION -->
  <!-- Fork -->
  <path d="M 418 248 L 438 295 L 448 295 L 432 250 Z" fill="#2E1065"/>
  <path d="M 428 248 L 445 295" stroke="#5B21B6" stroke-width="2" opacity="0.5"/>
  <!-- Front mudguard -->
  <path d="M 415 260 Q 450 270 455 310 Q 460 330 458 345 Q 445 330 445 295 Q 438 268 415 265 Z" fill="#3B0764"/>

  <!-- Handlebar stem -->
  <rect x="396" y="215" width="10" height="45" rx="3" fill="#1E0B40"/>
  <rect x="398" y="213" width="6" height="48" rx="2" fill="#334155"/>
  <!-- Handlebar -->
  <path d="M 368 218 Q 400 212 432 215 Q 436 215 436 220 Q 436 225 432 225 Q 402 222 370 228 Q 366 228 366 223 Q 366 218 370 218 Z" fill="#1E293B"/>
  <!-- Grip right -->
  <rect x="422" y="216" width="20" height="12" rx="4" fill="#334155"/>
  <rect x="422" y="216" width="20" height="12" rx="4" fill="#7C3AED" opacity="0.4"/>
  <!-- Grip left -->
  <rect x="360" y="219" width="16" height="10" rx="4" fill="#334155"/>

  <!-- Dashboard/instrument cluster -->
  <rect x="392" y="225" width="32" height="22" rx="5" fill="#0F172A"/>
  <rect x="393" y="226" width="30" height="20" rx="4" fill="#1E293B"/>
  <!-- Speedometer display -->
  <text x="408" y="239" text-anchor="middle" font-family="Inter,system-ui" font-size="9" fill="#A78BFA" font-weight="900">45km/h</text>

  <!-- Headlight -->
  <ellipse cx="453" cy="270" rx="14" ry="10" fill="#F59E0B" opacity="0.9"/>
  <ellipse cx="453" cy="270" rx="10" ry="7" fill="#FDE68A" opacity="0.8"/>
  <!-- Headlight beam -->
  <path d="M 465 268 L 530 255 L 530 285 L 465 272 Z" fill="#F59E0B" opacity="0.06" filter="url(#softBlur2)"/>

  <!-- Motor/battery box under body -->
  <rect x="240" y="318" width="100" height="20" rx="5" fill="#1E0B40"/>
  <rect x="243" y="321" width="94" height="14" rx="4" fill="#0F172A"/>
  <!-- Battery indicator -->
  <rect x="250" y="323" width="72" height="10" rx="3" fill="#16213e"/>
  <rect x="252" y="325" width="55" height="6" rx="2" fill="#7C3AED" opacity="0.9"/>
  <text x="326" y="331" font-family="Inter,system-ui" font-size="7" fill="#A78BFA" font-weight="700">80%</text>

  <!-- LIGHTNING BOLT (electric symbol) -->
  <path d="M 295 155 L 312 185 L 298 185 L 318 215 L 280 195 L 296 195 Z" fill="#F59E0B" opacity="0.95"/>

  <!-- Floating info cards -->
  <!-- Top left: Speed card -->
  <g transform="translate(20, 50)">
    <rect width="148" height="68" rx="14" fill="#fff" opacity="0.04" stroke="#7C3AED" stroke-width="0.8"/>
    <text x="14" y="24" font-family="Inter,system-ui" font-size="9" fill="#A78BFA" font-weight="800" letter-spacing="2">⚡ ELECTRIC BIKE</text>
    <text x="14" y="46" font-family="Inter,system-ui" font-size="18" fill="white" font-weight="900">80 km/charge</text>
    <text x="14" y="62" font-family="Inter,system-ui" font-size="9" fill="#8B5CF6" font-weight="600">Long range battery</text>
  </g>

  <!-- Top right: EMI card -->
  <g transform="translate(432, 50)">
    <rect width="148" height="68" rx="14" fill="#fff" opacity="0.04" stroke="#7C3AED" stroke-width="0.8"/>
    <text x="14" y="24" font-family="Inter,system-ui" font-size="9" fill="#A78BFA" font-weight="800" letter-spacing="2">EMI FROM</text>
    <text x="14" y="46" font-family="Inter,system-ui" font-size="18" fill="white" font-weight="900">₹999/mo</text>
    <text x="14" y="62" font-family="Inter,system-ui" font-size="9" fill="#8B5CF6" font-weight="600">Zero down payment</text>
  </g>

  <!-- Bottom right feature pill -->
  <g transform="translate(430, 395)">
    <rect width="148" height="68" rx="14" fill="#fff" opacity="0.04" stroke="#4C1D95" stroke-width="0.8"/>
    <text x="14" y="24" font-family="Inter,system-ui" font-size="9" fill="#A78BFA" font-weight="800" letter-spacing="2">APPROVAL</text>
    <text x="14" y="46" font-family="Inter,system-ui" font-size="18" fill="white" font-weight="900">24 Hours</text>
    <text x="14" y="62" font-family="Inter,system-ui" font-size="9" fill="#8B5CF6" font-weight="600">Instant processing</text>
  </g>

  <!-- Stars decoration -->
  <circle cx="70" cy="170" r="2" fill="white" opacity="0.4"/>
  <circle cx="120" cy="140" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="540" cy="170" r="2" fill="white" opacity="0.4"/>
  <circle cx="570" cy="200" r="1.5" fill="white" opacity="0.25"/>
  <circle cx="30" cy="300" r="1.5" fill="#A78BFA" opacity="0.5"/>
  <circle cx="565" cy="340" r="1.5" fill="#A78BFA" opacity="0.4"/>
</svg>
