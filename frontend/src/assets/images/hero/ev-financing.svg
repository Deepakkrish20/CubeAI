<svg viewBox="0 0 600 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroBg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09070F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E0B40;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B0764" />
      <stop offset="100%" style="stop-color:#6D28D9" />
    </linearGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#4C1D95;stop-opacity:0" />
    </radialGradient>
    <filter id="blur2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="25"/>
    </filter>
    <filter id="blur3">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="600" height="480" fill="url(#heroBg2)"/>
  
  <!-- Glow blob -->
  <circle cx="300" cy="200" r="180" fill="url(#glow2)" filter="url(#blur2)" opacity="0.7"/>

  <!-- Grid -->
  <g stroke="#4C1D95" stroke-width="0.4" opacity="0.12">
    <line x1="0" y1="80" x2="600" y2="80"/><line x1="0" y1="160" x2="600" y2="160"/>
    <line x1="0" y1="240" x2="600" y2="240"/><line x1="0" y1="320" x2="600" y2="320"/>
    <line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="480"/><line x1="200" y1="0" x2="200" y2="480"/>
    <line x1="300" y1="0" x2="300" y2="480"/><line x1="400" y1="0" x2="400" y2="480"/>
    <line x1="500" y1="0" x2="500" y2="480"/>
  </g>

  <!-- Large central fintech card illustration -->
  <g transform="translate(120, 80)">
    <!-- Main glass card -->
    <rect width="360" height="220" rx="24" fill="#ffffff" opacity="0.04" stroke="#7C3AED" stroke-width="1"/>
    <rect width="360" height="220" rx="24" fill="url(#cardGrad)" opacity="0.12"/>
    
    <!-- Card shine -->
    <rect x="1" y="1" width="358" height="60" rx="23" fill="white" opacity="0.04"/>
    
    <!-- Card chip -->
    <rect x="30" y="50" width="48" height="36" rx="6" fill="#F59E0B" opacity="0.9"/>
    <line x1="46" y1="50" x2="46" y2="86" stroke="#D97706" stroke-width="1"/>
    <line x1="62" y1="50" x2="62" y2="86" stroke="#D97706" stroke-width="1"/>
    <line x1="30" y1="68" x2="78" y2="68" stroke="#D97706" stroke-width="1"/>
    
    <!-- Card number -->
    <text x="30" y="135" font-family="'Courier New',monospace" font-size="16" fill="white" opacity="0.7" letter-spacing="4">•••• •••• •••• 2025</text>
    
    <!-- Card name -->
    <text x="30" y="165" font-family="Inter,system-ui" font-size="11" fill="white" opacity="0.5" font-weight="600" letter-spacing="2">BUNDELA FIN CORP</text>
    
    <!-- Logo -->
    <circle cx="310" cy="65" r="22" fill="#7C3AED" opacity="0.5"/>
    <circle cx="326" cy="65" r="22" fill="#A78BFA" opacity="0.3"/>
    
    <!-- Valid date -->
    <text x="30" y="195" font-family="Inter,system-ui" font-size="9" fill="white" opacity="0.4" letter-spacing="1">VALID THRU 12/30</text>
    
    <!-- NFC icon -->
    <path d="M 300 165 Q 315 155 315 165 Q 315 175 300 165" stroke="#A78BFA" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M 295 160 Q 320 148 320 165 Q 320 182 295 170" stroke="#A78BFA" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M 290 155 Q 325 140 325 165 Q 325 190 290 175" stroke="#A78BFA" stroke-width="1" fill="none" opacity="0.3"/>
  </g>

  <!-- Floating elements -->
  <!-- Lightning bolt -->
  <path d="M 80 150 L 95 185 L 80 185 L 100 220 L 68 200 L 83 200 Z" fill="#F59E0B" opacity="0.9"/>

  <!-- Circular progress -->
  <g transform="translate(490, 120)">
    <circle cx="40" cy="40" r="38" fill="none" stroke="#1E0B40" stroke-width="6"/>
    <circle cx="40" cy="40" r="38" fill="none" stroke="#7C3AED" stroke-width="6" stroke-dasharray="190 50" stroke-linecap="round" transform="rotate(-90 40 40)"/>
    <text x="40" y="44" font-family="Inter,system-ui" font-size="13" fill="white" font-weight="900" text-anchor="middle">96%</text>
    <text x="40" y="60" font-family="Inter,system-ui" font-size="7" fill="#8B5CF6" text-anchor="middle" letter-spacing="1">APPROVED</text>
  </g>

  <!-- Stat cards at bottom -->
  <g transform="translate(30, 360)">
    <rect width="140" height="70" rx="14" fill="#ffffff" opacity="0.04" stroke="#4C1D95" stroke-width="0.8"/>
    <text x="16" y="28" font-family="Inter,system-ui" font-size="20" fill="white" font-weight="900">₹10L</text>
    <text x="16" y="46" font-family="Inter,system-ui" font-size="9" fill="#8B5CF6" font-weight="700" letter-spacing="1">MAX LOAN AMOUNT</text>
    <text x="16" y="60" font-family="Inter,system-ui" font-size="9" fill="#6D28D9" font-weight="600">Upto 48 months tenure</text>
  </g>
  
  <g transform="translate(200, 360)">
    <rect width="140" height="70" rx="14" fill="#ffffff" opacity="0.04" stroke="#4C1D95" stroke-width="0.8"/>
    <text x="16" y="28" font-family="Inter,system-ui" font-size="20" fill="white" font-weight="900">0.9%</text>
    <text x="16" y="46" font-family="Inter,system-ui" font-size="9" fill="#8B5CF6" font-weight="700" letter-spacing="1">STARTING INTEREST</text>
    <text x="16" y="60" font-family="Inter,system-ui" font-size="9" fill="#6D28D9" font-weight="600">Per month flat rate</text>
  </g>

  <g transform="translate(370, 360)">
    <rect width="140" height="70" rx="14" fill="#ffffff" opacity="0.04" stroke="#4C1D95" stroke-width="0.8"/>
    <text x="16" y="28" font-family="Inter,system-ui" font-size="20" fill="white" font-weight="900">24 Hr</text>
    <text x="16" y="46" font-family="Inter,system-ui" font-size="9" fill="#8B5CF6" font-weight="700" letter-spacing="1">FAST DISBURSAL</text>
    <text x="16" y="60" font-family="Inter,system-ui" font-size="9" fill="#6D28D9" font-weight="600">Quick processing</text>
  </g>
</svg>
