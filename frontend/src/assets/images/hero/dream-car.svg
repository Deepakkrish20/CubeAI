<svg viewBox="0 0 600 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09070F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E0B40;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#4C1D95;stop-opacity:0" />
    </radialGradient>
    <filter id="blur4">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>
  <rect width="600" height="480" fill="url(#bg3)"/>
  <circle cx="300" cy="240" r="200" fill="url(#glow3)" filter="url(#blur4)" opacity="0.8"/>

  <!-- Grid -->
  <g stroke="#4C1D95" stroke-width="0.4" opacity="0.12">
    <line x1="0" y1="80" x2="600" y2="80"/><line x1="0" y1="160" x2="600" y2="160"/>
    <line x1="0" y1="240" x2="600" y2="240"/><line x1="0" y1="320" x2="600" y2="320"/>
    <line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="480"/><line x1="200" y1="0" x2="200" y2="480"/>
    <line x1="300" y1="0" x2="300" y2="480"/><line x1="400" y1="0" x2="400" y2="480"/>
    <line x1="500" y1="0" x2="500" y2="480"/>
  </g>

  <!-- Dream Car - Sedan silhouette -->
  <g transform="translate(60, 170)">
    <!-- Shadow -->
    <ellipse cx="240" cy="210" rx="220" ry="14" fill="#000" opacity="0.6"/>
    
    <!-- Car body lower -->
    <rect x="30" y="130" width="420" height="70" rx="12" fill="#3B0764"/>
    
    <!-- Car body upper/roof - sleek sedan -->
    <path d="M 80 130 Q 140 55 220 45 L 340 45 Q 410 55 450 130 Z" fill="#4C1D95"/>
    
    <!-- Windshields -->
    <path d="M 120 130 Q 165 68 210 58 L 290 58 Q 330 68 370 130 Z" fill="#8B5CF6" opacity="0.2"/>
    
    <!-- Side glass -->
    <rect x="170" y="68" width="75" height="58" rx="5" fill="#A78BFA" opacity="0.15"/>
    <rect x="260" y="68" width="75" height="58" rx="5" fill="#A78BFA" opacity="0.15"/>
    
    <!-- Door dividers -->
    <line x1="258" y1="62" x2="258" y2="200" stroke="#6D28D9" stroke-width="2" opacity="0.5"/>
    
    <!-- Front headlight DRL -->
    <path d="M 30 140 L 75 140 L 75 152 L 30 152 Z" rx="3" fill="#F59E0B" opacity="0.95"/>
    <path d="M 35 142 L 72 142 L 72 150 L 35 150 Z" fill="#FDE68A" opacity="0.7"/>
    
    <!-- Rear light -->
    <rect x="405" y="140" width="45" height="18" rx="4" fill="#EF4444" opacity="0.9"/>
    
    <!-- Wheels  -->
    <circle cx="145" cy="200" r="38" fill="#0F172A"/>
    <circle cx="145" cy="200" r="26" fill="#1E293B"/>
    <circle cx="145" cy="200" r="14" fill="#334155"/>
    <circle cx="145" cy="200" r="6" fill="#7C3AED"/>
    <!-- Spokes -->
    <line x1="145" y1="174" x2="145" y2="226" stroke="#475569" stroke-width="2"/>
    <line x1="119" y1="200" x2="171" y2="200" stroke="#475569" stroke-width="2"/>
    <line x1="126" y1="181" x2="164" y2="219" stroke="#475569" stroke-width="1.5"/>
    <line x1="126" y1="219" x2="164" y2="181" stroke="#475569" stroke-width="1.5"/>

    <circle cx="340" cy="200" r="38" fill="#0F172A"/>
    <circle cx="340" cy="200" r="26" fill="#1E293B"/>
    <circle cx="340" cy="200" r="14" fill="#334155"/>
    <circle cx="340" cy="200" r="6" fill="#7C3AED"/>
    <line x1="340" y1="174" x2="340" y2="226" stroke="#475569" stroke-width="2"/>
    <line x1="314" y1="200" x2="366" y2="200" stroke="#475569" stroke-width="2"/>
    <line x1="321" y1="181" x2="359" y2="219" stroke="#475569" stroke-width="1.5"/>
    <line x1="321" y1="219" x2="359" y2="181" stroke="#475569" stroke-width="1.5"/>

    <!-- Brand badge -->
    <circle cx="243" cy="130" r="10" fill="#7C3AED" opacity="0.6"/>
    <text x="243" y="134" text-anchor="middle" font-family="Inter,system-ui" font-size="9" fill="white" font-weight="900">B</text>
  </g>

  <!-- Top stat pill -->
  <g transform="translate(190, 30)">
    <rect width="220" height="42" rx="21" fill="#ffffff" opacity="0.04" stroke="#7C3AED" stroke-width="0.8"/>
    <text x="20" y="18" font-family="Inter,system-ui" font-size="9" fill="#A78BFA" font-weight="700" letter-spacing="2">🚗 USED CAR LOANS</text>
    <text x="20" y="34" font-family="Inter,system-ui" font-size="11" fill="white" font-weight="900">Zero Down Payment Options</text>
  </g>

  <!-- Side feature list -->
  <g transform="translate(28, 310)">
    <rect width="160" height="135" rx="16" fill="#ffffff" opacity="0.04" stroke="#4C1D95" stroke-width="0.8"/>
    <text x="14" y="26" font-family="Inter,system-ui" font-size="10" fill="#A78BFA" font-weight="700" letter-spacing="1">KEY BENEFITS</text>
    <circle cx="20" cy="45" r="4" fill="#7C3AED"/>
    <text x="30" y="49" font-family="Inter,system-ui" font-size="10" fill="#E2E8F0" font-weight="600">Fast Approval</text>
    <circle cx="20" cy="68" r="4" fill="#7C3AED"/>
    <text x="30" y="72" font-family="Inter,system-ui" font-size="10" fill="#E2E8F0" font-weight="600">Low Interest</text>
    <circle cx="20" cy="91" r="4" fill="#7C3AED"/>
    <text x="30" y="95" font-family="Inter,system-ui" font-size="10" fill="#E2E8F0" font-weight="600">Flexible EMIs</text>
    <circle cx="20" cy="114" r="4" fill="#7C3AED"/>
    <text x="30" y="118" font-family="Inter,system-ui" font-size="10" fill="#E2E8F0" font-weight="600">Min Documentation</text>
  </g>

  <!-- Right rating card -->
  <g transform="translate(420, 310)">
    <rect width="150" height="135" rx="16" fill="#ffffff" opacity="0.04" stroke="#4C1D95" stroke-width="0.8"/>
    <text x="75" y="30" text-anchor="middle" font-family="Inter,system-ui" font-size="10" fill="#A78BFA" font-weight="700" letter-spacing="1">RATING</text>
    <text x="75" y="72" text-anchor="middle" font-family="Inter,system-ui" font-size="40" fill="white" font-weight="900">4.9</text>
    <text x="75" y="90" text-anchor="middle" font-family="Inter,system-ui" font-size="18" fill="#F59E0B">★★★★★</text>
    <text x="75" y="115" text-anchor="middle" font-family="Inter,system-ui" font-size="9" fill="#8B5CF6" font-weight="600">50,000+ Reviews</text>
  </g>
</svg>
